name: mkdocs
# Build mkdocs site on push to main, deploy via GitHub Pages (artifact 방식).
# v0.7.53+ — public-facing consumer guide + reference (OKF_CONSUMER_GUIDE / QUICKSTART).
#
# NOTE (v1.0.1): 헤더에 "deploy to gh-pages branch" 라고 적혀 있었으나 실제로는
# actions/upload-pages-artifact + actions/deploy-pages (artifact 방식) 를 쓴다.
# gh-pages 브랜치를 쓰지 않으므로 contents 쓰기 권한도 필요 없다.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/mkdocs.yml'
  workflow_dispatch:

# v1.0.1: `actions/deploy-pages@v4` 는 OIDC 토큰을 요구한다 — `id-token: write` 가
# 없으면 `Unable to get ACTIONS_ID_TOKEN_REQUEST_URL env variable` 로 실패한다.
# 이 구멍은 지금까지 보이지 않았다: build 단계가 plugin config error 로 항상 중단돼
# **deploy job 이 한 번도 실행된 적이 없었기** 때문이다 (§2.28). build 를 고치자마자
# 다음 단계의 결함이 드러났다.
permissions:
  contents: read   # gh-pages 브랜치를 쓰지 않으므로 write 불필요 (최소 권한)
  pages: write
  id-token: write

concurrency:
  group: mkdocs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mkdocs + material
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs>=1.5" "mkdocs-material>=9.4"

      - name: Cross-link audit
        # v0.7.57+: audit_mkdocs_links.py — public-facing docs cross-link
        # audit. samples/ + archive/ 는 제외 (samples 는 self-contained OKF
        # bundle, archive 는 history). main docs 의 broken link 정공법.
        # NOTE: mkdocs --strict 는 사용 안 함 — ai-workflow/wiki/ 의 wiki
        # page 들이 mkdocs docs_dir 외부에 있어 116 warning 발생. follow-up:
        # mkdocs-multirepo 또는 docs/wiki/ mirror.
        run: python3 scripts/audit_mkdocs_links.py

      - name: Build
        # v0.7.61+: --strict ON (cross-link rewrite + exclude_docs 완료, 116 → 0 warning)
        # wiki/ 는 mkdocs docs_dir 외부라 cross-link 모두 GitHub absolute URL 로 rewrite.
        # samples/, archive/, planning/, architecture/ 는 exclude_docs.
        # v0.11.23+: PYTHONPATH=workflow-source 추가 — drift prevention P3 의
        # tools.mkdocs_git_dates plugin import 가능하게.
        run: PYTHONPATH=workflow-source mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
