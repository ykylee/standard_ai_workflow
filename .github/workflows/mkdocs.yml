name: mkdocs
# Build mkdocs site on push to main, deploy to gh-pages branch.
# v0.7.53+ — public-facing consumer guide + reference (OKF_CONSUMER_GUIDE / QUICKSTART).

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mkdocs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mkdocs + material
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs>=1.5" "mkdocs-material>=9.4"

      - name: Cross-link audit
        # v0.7.57+: audit_mkdocs_links.py — public-facing docs cross-link
        # audit. samples/ + archive/ 는 제외 (samples 는 self-contained OKF
        # bundle, archive 는 history). main docs 의 broken link 정공법.
        # NOTE: mkdocs --strict 는 사용 안 함 — ai-workflow/wiki/ 의 wiki
        # page 들이 mkdocs docs_dir 외부에 있어 116 warning 발생. follow-up:
        # mkdocs-multirepo 또는 docs/wiki/ mirror.
        run: python3 scripts/audit_mkdocs_links.py

      - name: Build
        # v0.7.57+: --strict OFF 유지 (위 cross-link audit 로 main docs 정합)
        run: mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
