name: smoke

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  smoke:
    name: Run smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements.txt
          python3 -m pip install -r requirements-dev.txt

      - name: Run smoke checks (run_all_checks + resource guard)
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}/workflow-source
        run: |
          set -uo pipefail
          # v1.0.0: 통합 runner 로 단일화. runner 가 check 마다 (a) 전용 TMPDIR 을 주고
          # 종료 후 삭제하고, (b) 프로세스 그룹째 정리하며, (c) 디스크/temp 상한을 강제한다.
          # 과거 사고: temp 누수가 tmpfs 경유 OOM (RAM) / 디스크 211GB 점유를 일으켰고,
          # per-check timeout 이 부모만 죽여 손자 프로세스가 고아로 누적됐다.
          mkdir -p "${RUNNER_TEMP}/smoke-tmp"
          # `|| rc=$?` 가 필수다. GitHub 의 bash 는 `-e` 로 돌기 때문에, runner 가
          # non-zero 로 끝나면 **다음 줄인 `rc=$?` 에 닿기도 전에 스텝이 중단**된다.
          # 그래서 아래 요약 생성 블록이 실패 시에는 한 번도 실행된 적이 없었고,
          # 어떤 check 가 깨졌는지 아무 데도 남지 않았다 (v1.0.1 에서 발견).
          rc=0
          python3 workflow-source/tests/run_all_checks.py \
            --timeout=120 \
            --tmp-dir="${RUNNER_TEMP}/smoke-tmp" \
            --json > smoke-result.json || rc=$?
          # v1.0.1: 요약을 파일로 먼저 받아 **step summary 와 job 로그 양쪽**에 낸다.
          # 이전에는 step summary 로만 보냈고 stdout 은 smoke-result.json 으로
          # 리다이렉트돼 있어, 실패해도 어떤 check 인지 로그/API 어디에서도 볼 수
          # 없었다 (annotation 은 "exit code 1" 만 남는다). 무엇이 깨졌는지 볼 수
          # 없으면 아무도 고치지 않는다 — 실제로 40회 연속 red 가 방치됐다.
          python3 - "$rc" <<'PY' > smoke-summary.md
          import json, sys, pathlib
          rc = int(sys.argv[1])
          data = json.loads(pathlib.Path("smoke-result.json").read_text(encoding="utf-8"))
          failures = [r for r in data["results"] if r["exit_code"] != 0]
          aborted = data.get("aborted_reason", "")
          if aborted:
              print("## Smoke ABORTED (resource guard)\n")
              print(f"- {aborted}")
              print(f"- 실행 완료: {data['total']} check (전량 아님)\n")
          if failures:
              print("## Smoke Failures\n")
              for r in failures:
                  label = "TIMEOUT" if r["last_line"] == "TIMEOUT" else f"exit {r['exit_code']}"
                  print(f"- `{r['path']}` ({label}) — {r['error_excerpt'][:120]}")
                  # annotation 은 stderr 로 (STEP_SUMMARY 오염 방지)
                  print(f"::error file={r['path']}::smoke check failed ({label})", file=sys.stderr)
              print("\n### Local Re-run\n")
              print("```bash")
              for r in failures:
                  print(f"python3 {r['path']}")
              print("```\n")
              print("See tests/README.md for failure triage order.")
          elif not aborted:
              print("## Smoke Passed\n")
              print(f"- All {data['total']} `check_*.py` scripts passed "
                    f"({data['total_passed_tests']} test cases).")
          leaky = [r for r in data["results"] if r["tmp_peak_mb"] or r["killed_children"]]
          if leaky:
              print(f"\n### Resource cleanup\n")
              print(f"- {len(leaky)} check 가 temp/자식 프로세스를 남겨 runner 가 회수했습니다.")
          PY
          cat smoke-summary.md >> "$GITHUB_STEP_SUMMARY"
          echo "----- smoke summary (job log) -----"
          cat smoke-summary.md
          exit "$rc"

      - name: Upload smoke result (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-result
          path: |
            smoke-result.json
            smoke-summary.md
          if-no-files-found: warn
          retention-days: 30
