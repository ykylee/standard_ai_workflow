name: smoke

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  smoke:
    name: Run smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements.txt
          python3 -m pip install -r requirements-dev.txt

      - name: Run workflow-source/tests/check_*.py
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}/workflow-source
        run: |
          set -euo pipefail
          failed=0
          failed_tests=""
          # v1.0.0: per-check timeout. timeout 이 없으면 hang 한 check 하나가 job
          # 전체를 무한 대기시키고, 중간에 kill 될 때 tempfile.TemporaryDirectory
          # 정리 코드가 돌지 않아 temp dir 이 누수된다 (/var/tmp 211GB 사건).
          # `timeout --kill-after` 로 SIGTERM (정리 가능) 을 먼저 보낸다.
          for t in workflow-source/tests/check_*.py; do
            echo "::group::$t"
            if timeout --signal=TERM --kill-after=10s 120s python3 "$t"; then
              echo "[PASS] $t"
              echo "::endgroup::"
            else
              rc=$?
              echo "::endgroup::"
              if [ "$rc" -eq 124 ] || [ "$rc" -eq 137 ]; then
                echo "::error file=$t::smoke check TIMEOUT (120s)"
              else
                echo "::error file=$t::smoke check failed (exit $rc)"
              fi
              failed=1
              failed_tests="${failed_tests}${t}\n"
            fi
          done
          if [ "$failed" -ne 0 ]; then
            {
              echo "## Smoke Failures"
              echo
              printf "%b" "$failed_tests" | sed 's/^/- /'
              echo
              echo "### Local Re-run"
              echo '```bash'
              printf "%b" "$failed_tests" | while IFS= read -r t; do
                [ -n "$t" ] && echo "python3 $t"
              done
              echo '```'
              echo
              echo "See tests/README.md for failure triage order."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Smoke Passed"
              echo
              echo "- All \`workflow-source/tests/check_*.py\` scripts passed."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$failed"
