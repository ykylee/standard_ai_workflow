name: smoke

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  smoke:
    name: Run smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests/check_*.py
        shell: bash
        run: |
          set -euo pipefail
          failed=0
          for t in tests/check_*.py; do
            echo "::group::$t"
            if python3 "$t"; then
              echo "::endgroup::"
            else
              echo "::endgroup::"
              echo "::error file=$t::smoke check failed"
              failed=1
            fi
          done
          exit "$failed"
