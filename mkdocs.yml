site_name: standard-ai-workflow
site_description: Open Knowledge Format (OKF) consumer guide + workflow_kit reference
site_url: https://ykylee.github.io/standard_ai_workflow/
repo_url: https://github.com/ykylee/standard_ai_workflow
repo_name: ykylee/standard_ai_workflow

docs_dir: docs
site_dir: site
# v0.7.61+ — exclude non-public-facing docs from mkdocs build (samples/, archive/,
# planning/, architecture/ 는 cross-link 의 source/target 양쪽이 docs/ 외부 참조).
# main docs (PROJECT_PROFILE / INSTALLATION_AND_USAGE / OKF_CONSUMER_*/CODE_INDEX/
# DOCUMENT_INDEX/RELEASE/index/FEEDBACK) 만 build 대상. cross-link 는 v0.7.61+ 에서
# 모두 GitHub absolute URL 로 rewrite (../README.md, ../QUICKSTART.md, ../ai-workflow/...,
# ../workflow-source/... 모두 외부).
exclude_docs: |
  samples/**
  archive/**
  planning/**
  architecture/**

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Consumer Quickstart (5 min): OKF_CONSUMER_QUICKSTART.md
  - Consumer Guide (full): OKF_CONSUMER_GUIDE.md
  - Project Profile: PROJECT_PROFILE.md
  - Code Index: CODE_INDEX.md
  - Document Index: DOCUMENT_INDEX.md
  - Installation & Usage: INSTALLATION_AND_USAGE.md
  - Release Notes: RELEASE.md
  - Feedback & Support (v0.7.56+): FEEDBACK.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - footnotes

plugins:
  - search
  # v0.11.23+ drift prevention P3: docs/*.md 의 '- 최종 수정일' 헤더를 build-time 에
  # git log date 로 자동 patch. PYTHONPATH=workflow-source 필수 (CI build step 에서 설정).
  # workflow-source/core/*.md 와 README.md 는 docs_dir 외부이므로 본 plugin 대상 ❌.
  - tools.mkdocs_git_dates:GitDatesPlugin

extra:
  generator: false
